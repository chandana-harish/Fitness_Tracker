apiVersion: apps/v1
kind:   StatefulSet 
metadata:
  name: mongodb
  namespace: chandana-ns
spec:
  replicas: 1
  minReadySeconds: 10
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate: 
  #     maxUnavailable: 0
  #     maxSurge: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 10 
      containers:
      - name: mongodb
        image: mongo:7-jammy
        
        ports:
        - containerPort: 27017
        resources:
          requests: 
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # volumeMounts:
        #   - name: chandana-vol #same name as volumes
        #     mountPath: /data/db

      # volumes: #sits outside the container
      #   - name: chandana-vol 
      #     emptyDir: 
      #       sizeLimit: "512Mi" #type of volume 
  # volumeClaimTemplates:
  # - metadata:
  #     name: chandana-vol
  #   spec:
  #     accessModes: ["ReadWriteMany"]
  #     resources:
  #       requests:
  #         storage: 2Gi 
  #     storageClassName: "fitnessstorage"

            

        


---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: chandana-ns
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP 
  clusterIP: None 
 
 